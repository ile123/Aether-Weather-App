spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/weather-dashboard
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    discovery:
      enabled: false
    gateway:
      routes:
        - id: weather-service
          uri: http://${WEATHER_SERVICE_HOST:localhost}:${WEATHER_SERVICE_PORT:8082}
          predicates:
            - Path=/api/weather/**
          filters:
            - name: CircuitBreaker
              args:
                name: weatherCB
                fallbackUri: forward:/fallback/weather

        - id: alert-service
          uri: http://${ALERT_SERVICE_HOST:localhost}:${ALERT_SERVICE_PORT:8083}
          predicates:
            - Path=/api/alerts/**
          filters:
            - name: CircuitBreaker
              args:
                name: alertCB
                fallbackUri: forward:/fallback/alert

        - id: preferences-service
          uri: http://${PREFERENCES_SERVICE_HOST:localhost}:${PREFERENCES_SERVICE_PORT:8084}
          predicates:
            - Path=/api/preferences/**
          filters:
            - name: CircuitBreaker
              args:
                name: preferencesCB
                fallbackUri: forward:/fallback/preferences

server:
  port: ${GATEWAY_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState

resilience4j:
  timelimiter:
    instances:
      weatherCB:
        timeoutDuration: 3s
      alertCB:
        timeoutDuration: 3s
      preferencesCB:
        timeoutDuration: 3s
  circuitbreaker:
    instances:
      weatherCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      alertCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      preferencesCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    io.github.resilience4j: DEBUG