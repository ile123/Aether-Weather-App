spring:
  kafka:
    bootstrap-servers: kafka:9092
  data:
    redis:
      host: redis
      port: 6379
  r2dbc:
    url: r2dbc:postgresql://postgres:5432/weather_db
    username: weather_user
    password: weather_pass
  datasource:
    url: jdbc:postgresql://postgres:5432/weather_db
    username: weather_user
    password: weather_pass
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
server:
  port: 8082
logging:
  level:
    liquibase: DEBUG
    org.springframework.boot.autoconfigure.liquibase: DEBUG