spring:
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    discovery:
      enabled: false
    gateway:
      routes:
        - id: weather-service
          uri: http://weather-service:8082
          predicates:
            - Path=/api/weather/**
          filters:
            - name: CircuitBreaker
              args:
                name: weatherCB
                fallbackUri: forward:/fallback/weather
        - id: alert-service
          uri: http://alert-service:8083
          predicates:
            - Path=/api/alerts/**
          filters:
            - name: CircuitBreaker
              args:
                name: alertCB
                fallbackUri: forward:/fallback/alert
server:
  port: 8081
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
logging:
  level:
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"