spring:
  data:
    redis:
      host: redis
      port: 6379
  r2dbc:
    url: r2dbc:postgresql://postgres:5432/alert_db
    username: alert_user
    password: alert_pass
  datasource:
    url: jdbc:postgresql://postgres:5432/alert_db
    username: alert_user
    password: alert_pass
  kafka:
    bootstrap-servers: kafka:9092
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

server:
  port: 8083