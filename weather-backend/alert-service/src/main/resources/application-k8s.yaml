spring:
  data:
    redis:
      host: redis
      port: 6379
  r2dbc:
    url: r2dbc:postgresql://postgres:5432/alert_db
    username: alert_user
    password: alert_pass
  datasource:
    url: jdbc:postgresql://postgres:5432/alert_db
    username: alert_user
    password: alert_pass
  kafka:
    bootstrap-servers: kafka:9092
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
server:
  port: 8083
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,r2dbc
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"