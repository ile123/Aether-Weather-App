spring:
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    discovery:
      enabled: false
    gateway:
      routes:
        # Added this because circuit breaker is making everything too slow, if 503 errors are too annoying then remove circuit breaker from them
        - id: weather-service-forecast
          uri: http://weather-service:8082
          predicates:
            - Path=/api/weather/forecast/**
        - id: weather-service-stream
          uri: http://weather-service:8082
          predicates:
            - Path=/api/weather/stream/**
        - id: weather-service
          uri: http://${WEATHER_SERVICE_HOST:localhost}:${WEATHER_SERVICE_PORT:8082}
          predicates:
            - Path=/api/weather/**
          filters:
            - name: CircuitBreaker
              args:
                name: weatherCB
                fallbackUri: forward:/fallback/weather
        - id: alert-service
          uri: http://${ALERT_SERVICE_HOST:localhost}:${ALERT_SERVICE_PORT:8083}
          predicates:
            - Path=/api/alerts/**
          filters:
            - name: CircuitBreaker
              args:
                name: alertCB
                fallbackUri: forward:/fallback/alert
server:
  port: 8081
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
logging:
  level:
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"